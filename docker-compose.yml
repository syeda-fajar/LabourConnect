version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: fajar_user
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: plateform_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fajar_user -d plateform_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis_cache:
        condition: service_started  # Ensures Redis starts up along with your API
    environment:
      - PORT=8000
    env_file:
      - .env
    volumes:
      - .:/app  

  redis_cache:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  pgdata:
  redis_data: